# ═══════════════════════════════════════════════════════════════════════════════
# Job Sources Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Add, remove, or modify job sources here. No code changes needed.
# Just add a new entry and restart the agent.
#
# Each source needs:
#   - name: unique identifier
#   - type: scraper type (api_json, html_scrape, browser_scrape, rss)
#   - enabled: true/false
#   - base_url: the main URL or API endpoint
#   - search_url: URL pattern for searching (use {title} and {location} placeholders)
#   - rate_limit: max requests per minute
#   - headers: optional custom headers
#   - selectors: CSS selectors for HTML scraping (for html_scrape and browser_scrape)
#   - wait_selector: (browser_scrape only) CSS selector to wait for before parsing
# ═══════════════════════════════════════════════════════════════════════════════

sources:

  - name: indeed
    type: browser_scrape
    enabled: false  # Blocked by anti-bot (Cloudflare). Needs proxy rotation or API.
    base_url: https://www.indeed.com
    search_url: https://www.indeed.com/jobs?q={title}&l={location}&fromage=7
    rate_limit: 5
    wait_selector: ".job_seen_beacon"
    selectors:
      job_card: ".job_seen_beacon"
      title: "h2.jobTitle a"
      company: "[data-testid='company-name']"
      location: "[data-testid='text-location']"
      link: "h2.jobTitle a"
      description: "#jobDescriptionText"

  - name: linkedin
    type: html_scrape
    enabled: true
    base_url: https://www.linkedin.com
    search_url: https://www.linkedin.com/jobs/search/?keywords={title}&location={location}&f_TPR=r604800
    rate_limit: 3
    headers:
      Accept: text/html
    selectors:
      job_card: ".base-search-card"
      title: ".base-search-card__title"
      company: ".base-search-card__subtitle"
      location: ".job-search-card__location"
      link: ".base-card__full-link"
      description: ".description__text"

  - name: remoteok
    type: api_json
    enabled: true
    base_url: https://remoteok.com
    search_url: https://remoteok.com/api
    rate_limit: 10
    headers:
      Accept: application/json
    json_mapping:
      # Maps API response fields to our internal model
      title: position
      company: company
      location: location
      url: url
      description: description
      salary: salary
      tags: tags
      id_field: id
      id_prefix: "remoteok_"
    # First element in response is metadata, skip it
    skip_first: true

  - name: weworkremotely
    type: rss
    enabled: true
    base_url: https://weworkremotely.com
    search_url: https://weworkremotely.com/categories/remote-{category}-jobs.rss
    rate_limit: 8
    categories:
      - back-end-programming
      - front-end-programming
      - full-stack-programming
      - devops-sysadmin
    rss_mapping:
      title: title
      company: company
      url: link
      description: description
      id_field: guid
      id_prefix: "wwr_"

  - name: glassdoor
    type: browser_scrape
    enabled: false  # Blocked by anti-bot (Cloudflare). Needs proxy rotation or API.
    base_url: https://www.glassdoor.com
    search_url: https://www.glassdoor.com/Job/jobs.htm?sc.keyword={title}&locKeyword={location}
    rate_limit: 4
    wait_selector: "[data-test='jobListing']"
    selectors:
      job_card: "[data-test='jobListing']"
      title: "[data-test='job-title']"
      company: ".EmployerProfile_compactEmployerName__LE242"
      location: "[data-test='emp-location']"
      link: "[data-test='job-title']"
      description: ".JobDetails_jobDescription__uW_fK"

  # ─── India & Gulf ──────────────────────────────────────────────────────────

  - name: naukri
    type: browser_scrape
    enabled: false  # Blocked by Akamai anti-bot. Needs Naukri API or residential proxies.
    base_url: https://www.naukri.com
    search_url: https://www.naukri.com/{title}-jobs?k={title}&l={location}&experience=&nignbevent_src=jobsearchDeskGNB
    rate_limit: 5
    wait_selector: ".srp-jobtuple-wrapper"
    selectors:
      job_card: ".srp-jobtuple-wrapper"
      title: ".title"
      company: ".comp-name"
      location: ".locWdth"
      link: ".title"
      description: ".job-desc"
      salary: ".sal-wrap .ni-salary"
      experience: ".expwdth"

  - name: naukrigulf
    type: html_scrape
    enabled: false  # Blocked by Akamai anti-bot (drops connection). Needs official API.
    base_url: https://www.naukrigulf.com
    search_url: https://www.naukrigulf.com/{title}-jobs?k={title}&l={location}
    rate_limit: 5
    headers:
      Accept: text/html
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    selectors:
      job_card: ".srp-tuple"
      title: ".desig"
      company: ".comp-name"
      location: ".loc"
      link: ".desig a"
      description: ".job-description"
      salary: ".salary"

