[project]
name = "job-agent-contracts"
version = "0.3.0"
description = "Shared interfaces, models, and events for the job-apply-agent system"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/job_agent_contracts"]
