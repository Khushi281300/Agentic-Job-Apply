[project]
name = "job-agent-agents"
version = "0.3.0"
description = "Agent business logic, skills, workflows, and orchestration"
requires-python = ">=3.11"
dependencies = [
    "job-agent-contracts",
    "job-agent-services",
    # LangGraph & LangChain
    "langgraph>=0.2.0",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "langchain-core>=0.3.0",
    "langchain-community>=0.3.0",
    # Templates
    "jinja2>=3.1.0",
    # Config
    "pydantic-settings>=2.1.0",
    # Web scraping (for job detail extraction)
    "beautifulsoup4>=4.12.0",
    # Scheduling
    "apscheduler>=3.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/job_agent_agents"]
