[project]
name = "job-agent-dashboard"
version = "0.3.0"
description = "Streamlit web dashboard for the job-apply-agent (standalone, HTTP-only)"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.30.0",
    "httpx>=0.27.0",
    "pandas>=2.1.0",
]

[project.scripts]
job-agent-dashboard = "job_agent_dashboard.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/job_agent_dashboard"]
