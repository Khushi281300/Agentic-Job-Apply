[project]
name = "job-agent-services"
version = "0.3.0"
description = "Infrastructure service implementations (LLM, DB, RAG, Browser, Email, Notifications)"
requires-python = ">=3.11"
dependencies = [
    "job-agent-contracts",
    # HTTP
    "httpx>=0.27.0",
    # AI & RAG
    "chromadb>=0.4.22",
    "sentence-transformers>=2.3.0",
    # Browser automation
    "playwright>=1.40.0",
    # Data
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    # Observability
    "langsmith>=0.1.0",
    # Notifications
    "python-telegram-bot>=20.7",
    # PDF parsing
    "PyPDF2>=3.0.0",
    # Email
    "aiosmtplib>=3.0.0",
    # Utilities
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
gmail = ["google-auth>=2.0.0", "google-auth-oauthlib>=1.0.0", "google-api-python-client>=2.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/job_agent_services"]
